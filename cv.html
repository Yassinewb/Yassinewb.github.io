<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Vitae - Yassine Boulahia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary: #ff4500; 
            --primary-muted: rgba(255, 69, 0, 0.1);
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text-main: #cbd5e1; 
            --text-muted: #94a3b8;
            --border: #1a1a1a;
            --nav-bg: rgba(5, 5, 5, 0.9);
            --radius: 30px;
            --gradient: linear-gradient(135deg, #ff4500 0%, #e11d48 100%);
        }

        body.light-mode {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --nav-bg: rgba(248, 250, 252, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.5; font-size: 14px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* --- Navigation (Style Alfred Costes) --- */
        header { padding: 15px 0; background: var(--nav-bg); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo a { font-weight: 800; text-decoration: none; color: #fff; font-size: 1.1rem; }
        body.light-mode .logo a { color: #000; }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .back-btn { text-decoration: none; color: var(--primary); font-weight: 700; font-size: 0.85rem; transition: 0.3s; }
        .back-btn:hover { opacity: 0.7; }
        
        .download-btn {
            background: var(--gradient);
            color: white;
            padding: 8px 18px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #theme-toggle { background: var(--primary-muted); border: none; color: var(--primary); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- Hero Section --- */
        .hero { padding: 50px 0 30px; text-align: center; }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { background: var(--primary-muted); color: var(--primary); padding: 5px 15px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; display: inline-block; margin-bottom: 15px; }

        /* --- CV Display --- */
        .cv-card { 
            background: var(--card-bg); 
            border-radius: var(--radius); 
            padding: 20px; 
            border: 1px solid var(--border); 
            margin-bottom: 40px; 
            display: flex; 
            justify-content: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cv-card img { width: 100%; max-width: 800px; height: auto; border-radius: 15px; border: 1px solid var(--border); }

        footer { text-align: center; padding: 40px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 40px; }
        @media (max-width: 768px) { .hero h1 { font-size: 1.8rem; } .nav-right { gap: 10px; } }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <div class="logo"><a href="index.html">YASSINE.B</a></div>
                <div class="nav-right">
                    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Retour au Portfolio</a>
                    <a href="cv.pdf" download="Yassine_Boulahia_CV" class="download-btn">
                        <i class="fas fa-file-pdf"></i> PDF
                    </a>
                    <button id="theme-toggle"><i class="fas fa-moon"></i></button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <span class="badge">Curriculum Vitae</span>
            <h1>Parcours Professionnel</h1>
            <p style="color: var(--text-muted);">Étudiant en BTS SIO option SISR au Lycée René Descartes.</p>
        </section>

        <section class="cv-card">
            <img src="cv.png" alt="CV Yassine Boulahia" title="Visualiser mon CV">
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Yassine Boulahia - Tous droits réservés.</p>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
        });

        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            toggleBtn.querySelector('i').classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>
